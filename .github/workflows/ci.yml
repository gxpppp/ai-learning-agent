name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python (pytest + ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - run: uv sync
        working-directory: python/backend
      - run: uv run ruff check src/ tests/
        working-directory: python/backend
      - run: uv run mypy src/
        working-directory: python/backend
      - run: uv run pytest -v
        working-directory: python/backend

  typescript:
    name: TypeScript (tsc + biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run check-types
      - run: pnpm run lint
